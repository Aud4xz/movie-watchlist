<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>        
        <link rel="stylesheet" href="index.css"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <title>Movie Search</title>
    </head>
    <body>
        <header>
            <img src="images/hImage.jpeg" alt="Frames of the Godfather, Joker and Tony Montana.">
            <div class="h-wrapper">
                <h1>Find your film</h1>
                <p id="watchlist"><a href="/watchlist.html">My Watchlist</a></p>
            </div>
            <form>
                <input name="movie-name" type="text" placeholder="Search for a movie" aria-label="Search for a movie">
                <button name="search-btn" id="search-btn">Search</button>
            </form>
        </header>
        <main>
            <div class="explore">
                <img src="images/exploreIcon.png"/>
                <h1>Start exploring</h1>
            </div>
        </main>
        <script type="module" src="index.js"></script>
    </body>
</html>
